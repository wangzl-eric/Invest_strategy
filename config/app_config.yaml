# Application Configuration

ibkr:
  host: "127.0.0.1"
  port: 7496  # 7497 for paper trading, 7496 for live trading
  client_id: 1
  timeout: 30

# Flex Query Web Service Configuration
# To set up Flex Queries:
# 1. Log into IBKR Account Management (Client Portal)
# 2. Go to: Performance & Reports → Flex Queries
# 3. Create Activity Flex Query with desired sections (Trades, Positions, etc.)
# 4. Go to: Flex Queries → Configure Flex Web Service
# 5. Generate a Flex Web Service Token (valid for 1 year)
# 6. Note down Query IDs for each query you create
flex_query:
  # SECURITY NOTE:
  # Do not store secrets in this YAML. Provide the token via environment variable:
  #   FLEX_TOKEN="..." (set in .env file)
  token: ""

  # Define all your Flex Query reports here
  # Each report needs: id (query ID from IBKR), name (display name), type (category for organization)
  # Files will be saved as: data/flex_reports/{YYYY-MM-DD}/{type}/{name}_{timestamp}.csv
  queries:
    - id: "1369526"
      name: "performance"
      type: "mark-to-market"
      description: "Daily Mark-to-Market P&L"
    - id: "1369536"
      name: "Historical Trades"
      type: "trades"
      description: "Detailed trade execution history"
    #
    # - id: "YOUR_QUERY_ID"
    #   name: "Position Summary"
    #   type: "positions"
    #   description: "Current holdings and cost basis"
    #
    # - id: "YOUR_QUERY_ID"
    #   name: "Cash Transactions"
    #   type: "cash"
    #   description: "Dividends, interest, fees, deposits, withdrawals"
    #
    # - id: "YOUR_QUERY_ID"
    #   name: "Realized P&L"
    #   type: "pnl"
    #   description: "Realized gains and losses"

database:
  url: "sqlite:///./ibkr_analytics.db"  # Use PostgreSQL in production: postgresql://user:password@localhost/dbname
  echo: false

app:
  debug: false
  log_level: "INFO"
  update_interval_minutes: 15

# Data Source Configuration
# Prioritize IBKR for higher quality data, use yfinance as fallback
data_sources:
  # Primary source for each asset class
  equity: "ibkr"      # ibkr, yfinance
  fx: "ibkr"         # ibkr, yfinance
  futures: "ibkr"     # ibkr, yfinance
  commodity: "ibkr"   # ibkr, yfinance
  rate: "fred"        # fred, yfinance

  # Fallback when primary source is unavailable
  fallback:
    equity: "yfinance"
    fx: "yfinance"
    futures: "yfinance"
    commodity: "yfinance"
    rate: "yfinance"

  # Priority order for data source fallback (tested in order until success)
  priority_order:
    equity: ["ibkr", "parquet", "yfinance"]
    equity_index: ["yfinance", "parquet", "ibkr"]
    fx: ["ibkr", "parquet", "yfinance"]
    commodities: ["ibkr", "parquet", "yfinance"]
    rates: ["fred", "parquet", "yfinance"]
    macro: ["fred", "parquet"]
    fed_liquidity: ["fred", "parquet"]

  # Circuit breaker settings for source health tracking
  circuit_breaker:
    failure_threshold: 3  # Fail after 3 consecutive failures
    recovery_time_seconds: 60  # Wait 60s before retrying failed source

  # Cache TTL settings (in seconds)
  cache_ttl:
    realtime: 60       # yfinance real-time data
    fred: 3600        # FRED macro data (1 hour)
    parquet: 300      # Parquet store (5 minutes)
    historical: 900   # Historical data (15 minutes)

# Research Configuration
research:
  # DuckDB settings
  duckdb:
    # Read from Parquet files directly (no copy)
    read_parquet_direct: true
    # Memory limit for queries (MB)
    memory_limit: 4096

  # MLflow settings
  mlflow:
    tracking_uri: "http://localhost:5000"
    experiment_name: "quant_research"
    # Set to empty string to disable MLflow logging
    disabled: ""

  # Feature registry
  features:
    # Default lookback periods
    momentum_periods: [20, 60, 120, 252]
    volatility_periods: [20, 60, 252]
    correlation_periods: [60, 120, 252]

  # Backtest defaults
  backtest:
    default_initial_capital: 100000
    default_commission: 0.001  # 0.1% per trade
    default_slippage: 0.0005  # 0.05% slippage
