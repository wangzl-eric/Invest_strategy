[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=backend --cov=portfolio --cov=backtests --cov=execution
    --cov-fail-under=10
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    requires_ibkr: Tests that require IBKR connection
    requires_db: Tests that require database connection
